name: CI/CD Deploy to VPS (GHCR)

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ci-cd-demo

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata (LOWERCASE FIX)
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="sha-${GITHUB_SHA::7}"

          IMAGE="ghcr.io/$OWNER/${{ env.IMAGE_NAME }}"

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image }}:latest \
            -t ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} \
            .

          docker push ${{ steps.meta.outputs.image }}:latest
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            set -e

            IMAGE="${{ needs.build-and-push.outputs.image }}"
            TAG="${{ needs.build-and-push.outputs.tag }}"

            FULL_IMAGE="$IMAGE:$TAG"

            echo "Deploying $FULL_IMAGE"

            # Login to GHCR (recommended: use PAT stored on VPS instead of GITHUB_TOKEN)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            docker pull $FULL_IMAGE

            docker stop ci-cd-demo || true
            docker rm ci-cd-demo || true

            docker run -d \
              --name ci-cd-demo \
              --restart unless-stopped \
              -p 127.0.0.1:3000:3000 \
              $FULL_IMAGE